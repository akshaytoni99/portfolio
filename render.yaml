# Render Blueprint for the portfolio CMS backend (Express API).
# Storage is Supabase (Postgres + Storage), so NO persistent disk is needed
# and the FREE plan works. Deploy: Render → New → Blueprint → connect repo.
services:
  - type: web
    name: portfolio-cms
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/auth/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: CROSS_SITE
        value: "true"
      # Set these in the Render dashboard (Environment tab) — see docs/DEPLOY.md:
      - key: SUPABASE_URL # https://xxxx.supabase.co
        sync: false
      - key: SUPABASE_SERVICE_KEY # Supabase service_role key (secret)
        sync: false
      - key: JWT_SECRET # any long random string (stable across restarts)
        sync: false
      - key: CLIENT_ORIGIN # your Vercel URL, e.g. https://your.vercel.app
        sync: false
